# Shell
shell /usr/bin/zsh

# ── Font ─────────────────────────────────────────────────────────────────────
font_family      Adwaita Mono Regular
bold_font        Adwaita Mono Bold
italic_font      Adwaita Mono Italic
bold_italic_font Adwaita Mono Bold Italic
font_size        13.0

# ── Cursor ───────────────────────────────────────────────────────────────────
cursor_shape          block
cursor_blink_interval 0

# ── Scrollback ───────────────────────────────────────────────────────────────
scrollback_lines 10000

# ── Window ───────────────────────────────────────────────────────────────────
window_padding_width    12
hide_window_decorations yes
remember_window_size    yes

# ── Tabs ─────────────────────────────────────────────────────────────────────
tab_bar_style          powerline
tab_powerline_style    slanted
tab_bar_min_tabs       2

# ── Gruvbox dark colorscheme ─────────────────────────────────────────────────
background            #1d2021
foreground            #ebdbb2

selection_background  #d5c4a1
selection_foreground  #1d2021

cursor                #ebdbb2
cursor_text_color     #1d2021

# Black
color0  #282828
color8  #928374
# Red
color1  #cc241d
color9  #fb4934
# Green
color2  #98971a
color10 #b8bb26
# Yellow
color3  #d79921
color11 #fabd2f
# Blue
color4  #458588
color12 #83a598
# Magenta
color5  #b16286
color13 #d3869b
# Cyan
color6  #689d6a
color14 #8ec07c
# White
color7  #a89984
color15 #ebdbb2

# ── URL handling ─────────────────────────────────────────────────────────────
url_color             #83a598
url_style             curly
open_url_with         default

# ── Key bindings ─────────────────────────────────────────────────────────────
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab
map ctrl+equal  change_font_size all +1.0
map ctrl+minus  change_font_size all -1.0
map ctrl+0      change_font_size all 0
