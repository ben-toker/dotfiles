general {
    hide_cursor = true
    grace = 2
}

background {
    monitor =
    color = rgb(1d2021)
}

input-field {
    monitor =
    size = 280, 44
    position = 0, -80
    halign = center
    valign = center

    outline_thickness = 1
    outer_color = rgb(3c3836)
    inner_color = rgb(282828)
    color = rgb(ebdbb2)
    font_color = rgb(ebdbb2)
    font_family = Adwaita Mono

    placeholder_text =
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true

    fade_on_empty = false
    capslock_color = rgb(e5c07b)
    fail_color = rgb(e06c75)
    fail_text =
    check_color = rgb(a9b665)
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgb(ebdbb2)
    font_size = 64
    font_family = Adwaita Mono
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color = rgb(928374)
    font_size = 16
    font_family = Adwaita Mono
    position = 0, 40
    halign = center
    valign = center
}
