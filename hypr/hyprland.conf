################
### MONITORS ###
################

# eDP-1: laptop display
monitor = eDP-1, 1920x1080@60, 0x0, 1

# DP-2: Dell 4K — scale 2.0 gives crisp 1920x1080 effective resolution
# Alternative: 2560x1440@60 for 60Hz at lower resolution (change scale to 1)
monitor = DP-2, 3840x2160@60, 1920x0, 2


###################
### MY PROGRAMS ###
###################

$terminal  = kitty
$browser   = firefox
$editor    = code
$music     = spotify
$launcher  = rofi -show drun


#################
### AUTOSTART ###
#################

exec-once = waybar
exec-once = hypridle
exec-once = nm-applet --indicator
exec-once = hyprsunset -t 6000
# exec-once = hyprpaper


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in  = 4
    gaps_out = 8

    border_size = 1

    col.active_border   = rgba(888888ff)
    col.inactive_border = rgba(333333aa)

    resize_on_border = true
    layout = dwindle
}

decoration {
    rounding       = 6
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled      = true
        range        = 8
        render_power = 2
        color        = rgba(00000055)
    }

    blur {
        enabled = false
    }
}

animations {
    enabled = false
}

dwindle {
    preserve_split = true
    force_split    = 2
}

misc {
    force_default_wallpaper  = 0
    disable_hyprland_logo    = true
    disable_splash_rendering = true
}


#############
### INPUT ###
#############

# Note: caps lock tap/hold is handled by keyd, not xkb
input {
    kb_layout    = us
    follow_mouse = 1
    mouse_refocus = false

    sensitivity = 0

    touchpad {
        natural_scroll       = true
        tap-to-click         = true
        disable_while_typing = true
    }
}

device {
    name = tpps/2-ibm-trackpoint
    accel_profile = adaptive
    sensitivity = -1
}

gesture = 3, horizontal, workspace


###################
### KEYBINDINGS ###
###################

# Caps Lock (via keyd):
#   tap  = CTRL   → navigation, workspaces, layout
#   hold = SUPER  → app launchers, kill, lock, session

# ── Focus navigation ─────────────────────────────────────────────────────────
bind = CTRL, I, movefocus, u
bind = CTRL, J, movefocus, l
bind = CTRL, K, movefocus, d
bind = CTRL, L, movefocus, r

# ── Move window ──────────────────────────────────────────────────────────────
bind = CTRL SHIFT, I, movewindow, u
bind = CTRL SHIFT, J, movewindow, l
bind = CTRL SHIFT, K, movewindow, d
bind = CTRL SHIFT, L, movewindow, r

# ── Layout / split ───────────────────────────────────────────────────────────
bind = CTRL, R,         layoutmsg, swapsplit
bind = CTRL, E,         layoutmsg, togglesplit
bind = CTRL, T,         togglefloating,
bind = CTRL, T,         centerwindow,

# ── Cycle windows ────────────────────────────────────────────────────────────
bind = CTRL, semicolon, cyclenext,
bind = CTRL, comma,     cyclenext, prev

# ── Window operations ────────────────────────────────────────────────────────
bind = SUPER ALT, F, fullscreen, 1
bind = SUPER ALT, C, centerwindow,
bind = SUPER ALT, M, movetoworkspace, special:minimized

# ── Kill window ──────────────────────────────────────────────────────────────
bind = SUPER, Q, killactive,

# ── App launchers (caps hold = SUPER) ────────────────────────────────────────
bind = SUPER,       Return,  exec, $terminal
bind = SUPER SHIFT, Return,  exec, $editor
bind = SUPER SHIFT, A,       exec, $browser
bind = SUPER SHIFT, M,       exec, $music
bind = SUPER,       space,   exec, $launcher

# ── Workspace switching ───────────────────────────────────────────────────────
bind = CTRL, 1, workspace, 1
bind = CTRL, 2, workspace, 2
bind = CTRL, 3, workspace, 3
bind = CTRL, 4, workspace, 4
bind = CTRL, 5, workspace, 5
bind = CTRL, 6, workspace, 6
bind = CTRL, 7, workspace, 7
bind = CTRL, 8, workspace, 8
bind = CTRL, 9, workspace, 9
bind = CTRL, 0, workspace, 10

# ── Move window to workspace ──────────────────────────────────────────────────
bind = CTRL SHIFT, 1, movetoworkspace, 1
bind = CTRL SHIFT, 2, movetoworkspace, 2
bind = CTRL SHIFT, 3, movetoworkspace, 3
bind = CTRL SHIFT, 4, movetoworkspace, 4
bind = CTRL SHIFT, 5, movetoworkspace, 5
bind = CTRL SHIFT, 6, movetoworkspace, 6
bind = CTRL SHIFT, 7, movetoworkspace, 7
bind = CTRL SHIFT, 8, movetoworkspace, 8
bind = CTRL SHIFT, 9, movetoworkspace, 9
bind = CTRL SHIFT, 0, movetoworkspace, 10

# ── Relative workspace nav ────────────────────────────────────────────────────
bind = CTRL ALT, J, movetoworkspace, e-1
bind = CTRL ALT, L, movetoworkspace, e+1

# ── Mouse drag to move/resize ─────────────────────────────────────────────────
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# ── Media / brightness keys ───────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPause,        exec, playerctl play-pause
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioPrev,         exec, playerctl previous

# ── Screenshots ───────────────────────────────────────────────────────────────
bind = SUPER SHIFT, 3, exec, grim - | wl-copy
bind = ALT   SHIFT, 4, exec, grim -g "$(slurp)" - | wl-copy

# ── Session ───────────────────────────────────────────────────────────────────
bind = SUPER, escape,   exec, hyprlock
bind = SUPER SHIFT, E,  exit,


##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
    name  = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name  = float-small-windows
    match:class = (pavucontrol|nm-connection-editor|blueman-manager)
    float = true
    center = true
}
