################
### MONITORS ###
################

monitor = , preferred, auto, 1


###################
### MY PROGRAMS ###
###################

$terminal  = kitty
$browser   = firefox
$editor    = code
$music     = spotify
$launcher  = rofi -show drun


#################
### AUTOSTART ###
#################

exec-once = waybar
# exec-once = hyprpaper


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


#####################
### LOOK AND FEEL ###
#####################

# Minimal — matches yabai's 5pt gaps, no flair
general {
    gaps_in  = 4
    gaps_out = 8

    border_size = 1

    col.active_border   = rgba(888888ff)
    col.inactive_border = rgba(333333aa)

    resize_on_border = true
    layout = dwindle
}

decoration {
    rounding       = 6
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled      = true
        range        = 8
        render_power = 2
        color        = rgba(00000055)
    }

    blur {
        enabled = false
    }
}

animations {
    enabled = false
}

dwindle {
    preserve_split    = true
    # new windows spawn on the right/bottom — mirrors yabai's second_child
    force_split       = 2
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
    disable_splash_rendering = true
}


#############
### INPUT ###
#############

input {
    kb_layout   = us
    kb_options  = caps:super
    follow_mouse = 1
    mouse_refocus = false   # mirrors yabai: mouse_follows_focus but not focus_follows_mouse

    sensitivity = 0

    touchpad {
        natural_scroll    = true
        tap-to-click      = true
        disable_while_typing = true
    }
}

gesture = 3, horizontal, workspace


###################
### KEYBINDINGS ###
###################

# Key translation from macOS skhd:
#   skhd ctrl       → SUPER        (bare ctrl conflicts with apps on Linux)
#   skhd ctrl+shift → SUPER SHIFT
#   skhd cmd        → SUPER ALT
#   skhd cmd+shift  → SUPER SHIFT  (app launchers)

# ── Focus navigation (skhd: ctrl - i/j/k/l) ─────────────────────────────────
# i/j/k/l form a directional cluster: i=up, j=left, k=down, l=right
bind = SUPER, I, movefocus, u
bind = SUPER, J, movefocus, l
bind = SUPER, K, movefocus, d
bind = SUPER, L, movefocus, r

# ── Move window (skhd: shift+ctrl - i/j/k/l) ────────────────────────────────
bind = SUPER SHIFT, I, movewindow, u
bind = SUPER SHIFT, J, movewindow, l
bind = SUPER SHIFT, K, movewindow, d
bind = SUPER SHIFT, L, movewindow, r

# ── Layout / split (skhd: ctrl-r, ctrl-e, ctrl-t) ───────────────────────────
bind = SUPER, R,         layoutmsg, swapsplit      # rotate/swap split direction (≈ yabai rotate 90)
bind = SUPER, E,         layoutmsg, togglesplit    # toggle split orientation
bind = SUPER, T,         togglefloating,            # toggle float + center (≈ yabai toggle float)
bind = SUPER, T,         centerwindow,

# ── Cycle windows in focused group (skhd: ctrl-; and ctrl-,) ────────────────
bind = SUPER, semicolon, cyclenext,
bind = SUPER, comma,     cyclenext, prev

# ── Window operations (skhd: cmd+alt - f/c/m) ───────────────────────────────
bind = SUPER ALT, F,     fullscreen, 1             # maximize (fill screen, keep borders)
bind = SUPER ALT, C,     centerwindow,             # center floating window
bind = SUPER ALT, M,     movetoworkspace, special:minimized   # "minimize" to scratchpad

# ── Kill window ──────────────────────────────────────────────────────────────
bind = SUPER, Q, killactive,

# ── App launchers (skhd: cmd-return, cmd+shift-return/a/m) ──────────────────
bind = SUPER,       Return,   exec, $terminal
bind = SUPER SHIFT, Return,   exec, $editor
bind = SUPER SHIFT, A,        exec, $browser
bind = SUPER SHIFT, M,        exec, $music
bind = SUPER,       space,    exec, $launcher      # bonus: launcher on super+space

# ── Workspace switching (skhd: ctrl-1 through ctrl-5) ───────────────────────
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# ── Move window to workspace (skhd: shift+ctrl-1 through shift+ctrl-5) ──────
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# ── Relative workspace nav (skhd: cmd+shift-j/l) ────────────────────────────
bind = SUPER CTRL, J, movetoworkspace, e-1
bind = SUPER CTRL, L, movetoworkspace, e+1

# ── Mouse drag to move/resize ────────────────────────────────────────────────
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# ── Media / brightness keys ──────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPause,        exec, playerctl play-pause
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioPrev,         exec, playerctl previous

# ── Screenshots (macOS-style) ────────────────────────────────────────────────
# SUPER+SHIFT+3 = fullscreen, SUPER+SHIFT+4 = region select
bind = SUPER SHIFT, 3, exec, grim - | wl-copy
bind = SUPER SHIFT, 4, exec, grim -g "$(slurp)" - | wl-copy

# ── Hyprland session ─────────────────────────────────────────────────────────
bind = SUPER SHIFT, E, exit,


##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
    name  = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

# Float dialogs / popups naturally
windowrule {
    name  = float-small-windows
    match:class = (pavucontrol|nm-connection-editor|blueman-manager)
    float = true
    center = true
}
