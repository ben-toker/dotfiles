# TLP config for ThinkPad T480
# Drop this at /etc/tlp.d/99-thinkpad-t480.conf (sudo required)

# ── CPU ──────────────────────────────────────────────────────────────────────
CPU_SCALING_GOVERNOR_ON_AC=performance
CPU_SCALING_GOVERNOR_ON_BAT=powersave

CPU_ENERGY_PERF_POLICY_ON_AC=performance
CPU_ENERGY_PERF_POLICY_ON_BAT=power

CPU_BOOST_ON_AC=1
CPU_BOOST_ON_BAT=0

# ── Battery charge thresholds ─────────────────────────────────────────────────
# Preserves long-term battery health — keeps cells out of high-stress zone.
# BAT0 = internal (non-removable), BAT1 = removable rear battery.
START_CHARGE_THRESH_BAT0=75
STOP_CHARGE_THRESH_BAT0=100

START_CHARGE_THRESH_BAT1=75
STOP_CHARGE_THRESH_BAT1=100

# ── Disk ─────────────────────────────────────────────────────────────────────
DISK_APM_LEVEL_ON_AC="254 254"
DISK_APM_LEVEL_ON_BAT="128 128"

# ── PCIe / ASPM ──────────────────────────────────────────────────────────────
PCIE_ASPM_ON_AC=default
PCIE_ASPM_ON_BAT=powersupersave

# ── USB autosuspend ───────────────────────────────────────────────────────────
USB_AUTOSUSPEND=1
# Exclude USB devices that break with autosuspend (add IDs if needed)
# USB_DENYLIST="1234:5678"

# ── Radio ─────────────────────────────────────────────────────────────────────
WIFI_PWR_ON_AC=off
WIFI_PWR_ON_BAT=on
